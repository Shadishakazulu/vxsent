<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SENT. Receipt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a1628;
      color: #00ff9d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #0d1f3c;
      border: 1px solid #1a3a5c;
      border-radius: 4px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }
    .logo { font-size: 28px; letter-spacing: 6px; font-weight: bold; }
    .logo-dot { color: #00ff9d; margin-right: 8px; }
    .subtitle { color: #7a8fa6; font-size: 11px; letter-spacing: 3px; margin-top: 4px; }
    .divider { border: none; border-top: 1px solid #1a3a5c; margin: 24px 0; }

    /* Status banners */
    .banner {
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }
    .banner-green { background: #0d2a1a; border: 1px solid #00b356; color: #00ff9d; }
    .banner-amber { background: #1a1a0d; border: 1px solid #b38600; color: #ffd700; }

    /* Proof table */
    .proof-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .proof-table td { padding: 8px 0; font-size: 12px; border-bottom: 1px solid #0f2a45; vertical-align: top; }
    .proof-table td:first-child { color: #7a8fa6; letter-spacing: 2px; width: 120px; padding-right: 12px; }
    .proof-table td:last-child { color: #e0e0e0; }
    .proof-id { color: #00ff9d !important; font-size: 11px !important; word-break: break-all; }
    .hash-val { font-size: 10px !important; word-break: break-all; color: #8899aa !important; }
    .rac-level-val { color: #00ff9d !important; font-weight: bold; }

    /* RAC chain layers */
    .rac-chain {
      background: #091525;
      border: 1px solid #1a3a5c;
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .rac-chain-title {
      color: #7a8fa6;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .rac-layer {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .rac-layer:last-child { margin-bottom: 0; }
    .rac-layer-badge {
      background: #0d2a1a;
      border: 1px solid #00b356;
      color: #00ff9d;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rac-layer-badge.pending {
      background: #1a1a0d;
      border-color: #b38600;
      color: #ffd700;
    }
    .rac-layer-text { color: #e0e0e0; line-height: 1.4; }
    .rac-layer-label { color: #7a8fa6; font-size: 10px; letter-spacing: 1px; }

    /* What this proves section */
    .proof-points {
      background: #091525;
      border: 1px solid #1a3a5c;
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .proof-points-title {
      color: #7a8fa6;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .proof-point {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #e0e0e0;
      line-height: 1.4;
    }
    .proof-point:last-child { margin-bottom: 0; }
    .proof-point-check { color: #00ff9d; flex-shrink: 0; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 12px 20px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
      border: none;
    }
    .btn-primary { background: #00b356; color: #0a1628; font-weight: bold; }
    .btn-outline { background: transparent; border: 1px solid #1a3a5c; color: #7a8fa6; }
    .btn-confirm { background: #00ff9d; color: #0a1628; font-weight: bold; font-size: 13px; width: 100%; text-align: center; padding: 16px; margin-top: 4px; }
    .copy-feedback { color: #00ff9d; font-size: 11px; letter-spacing: 2px; display: none; }
    .copy-feedback.show { display: inline; }

    /* Confirm section */
    .confirm-section {
      margin-top: 20px;
      padding: 20px;
      background: #091525;
      border: 1px solid #00b356;
      border-radius: 2px;
    }
    .confirm-section h3 {
      color: #00ff9d;
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .confirm-section p {
      color: #7a8fa6;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* Pending state */
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #1a3a5c;
      border-top-color: #00ff9d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pending-title { text-align: center; font-size: 14px; letter-spacing: 3px; margin-bottom: 8px; }
    .pending-sub { text-align: center; color: #7a8fa6; font-size: 12px; }

    /* Error state */
    .error-title { color: #dc2626; font-size: 14px; letter-spacing: 3px; margin-bottom: 8px; }
    .error-sub { color: #7a8fa6; font-size: 12px; }

    /* Nav links */
    .nav-links { margin-top: 24px; display: flex; gap: 16px; }
    .nav-links a { color: #7a8fa6; font-size: 11px; letter-spacing: 2px; text-decoration: none; }
    .nav-links a:hover { color: #00ff9d; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header (always shown) -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="color:#00ff9d;font-size:18px">●</span>
      <span class="logo">SENT.</span>
    </div>
    <p class="subtitle">SENT. RAC V1 — PROOF OF DELIVERY — LEVEL 3</p>
    <hr class="divider">

    <!-- Dynamic content -->
    <div id="receipt-content">
      <!-- Pending state shown by default -->
      <div class="spinner"></div>
      <p class="pending-title">SEALING YOUR PROOF...</p>
      <p class="pending-sub">Payment confirmed. Sealing your proof on RAC Level 3 chain...</p>
    </div>

    <!-- Nav links (always shown) -->
    <div class="nav-links">
      <a href="/">← Create New Proof</a>
      <a href="/dashboard">My Dashboard</a>
    </div>
  </div>

  <script>
    // ── URL param parsing ──────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const proofId = params.get('id');
    const sessionId = params.get('session_id');
    const showConfirm = params.get('confirm') === 'true';

    let pollCount = 0;
    const MAX_POLLS = 40; // 40 × 3s = 2 minutes
    let pollTimer = null;

    // ── Render functions ───────────────────────────────────────────────────
    function renderPending() {
      document.getElementById('receipt-content').innerHTML = `
        <div class="spinner"></div>
        <p class="pending-title">SEALING YOUR PROOF...</p>
        <p class="pending-sub">Payment confirmed. Sealing your proof on RAC Level 3 chain...</p>
      `;
    }

    function renderError(msg) {
      document.getElementById('receipt-content').innerHTML = `
        <p class="error-title">ERROR</p>
        <p class="error-sub">${msg || 'Proof not found. Please check the URL or contact support.'}</p>
      `;
    }

    function renderProof(proof) {
      const isValid = proof.is_valid || proof.status === 'verified';
      const isConfirmed = proof.recipient_confirmed;
      const sealedAt = proof.sealed_at || proof.timestamp || proof.created_at;
      const displayDate = sealedAt ? new Date(sealedAt).toUTCString() : 'N/A';
      const chainHash = proof.rac_chain_hash || proof.chain_hash || proof.rac_signature || '';
      const verifyUrl = `https://vxsent.com/verify/${proof.proof_id}`;
      const receiptUrl = `https://vxsent.com/receipt?id=${proof.proof_id}`;
      const senderEmail = proof.sender_email || proof.user_email || 'N/A';
      const recipientEmail = proof.recipient_email || '';

      let statusBanner = '';
      if (isConfirmed) {
        statusBanner = `<div class="banner banner-green">✓ DELIVERY CONFIRMED — RAC LEVEL 3 COMPLETE (ALL 4 LAYERS)</div>`;
      } else if (isValid) {
        statusBanner = `<div class="banner banner-green">✓ PROOF SEALED — AWAITING RECIPIENT CONFIRMATION (LAYER 4)</div>`;
      } else {
        statusBanner = `<div class="banner banner-amber">⏳ SEALING IN PROGRESS...</div>`;
      }

      const confirmSection = (!isConfirmed && recipientEmail && showConfirm) ? `
        <div class="confirm-section">
          <h3>CONFIRM RECEIPT</h3>
          <p>Confirming receipt seals Layer 4 (WHEN) of the RAC chain, making this proof fully verifiable and legally robust.</p>
          <button class="btn btn-confirm" onclick="confirmReceipt('${proof.proof_id}')">CONFIRM RECEIPT — SEAL LAYER 4 →</button>
        </div>
      ` : '';

      // Build RAC chain layers display
      const layer4Badge = isConfirmed
        ? `<span class="rac-layer-badge">✓ SEALED</span>`
        : `<span class="rac-layer-badge pending">⏳ PENDING</span>`;
      const layer4Text = isConfirmed
        ? `<span class="rac-layer-text">Recipient confirmed at ${proof.recipient_confirmed_at ? new Date(proof.recipient_confirmed_at).toUTCString() : 'N/A'}</span>`
        : `<span class="rac-layer-text">Awaiting recipient confirmation — <a href="${verifyUrl}?confirm=true" style="color:#00ff9d">confirm now</a></span>`;

      const html = `
        ${statusBanner}
        <table class="proof-table">
          <tr><td>PROOF ID</td><td class="proof-id">${proof.proof_id}</td></tr>
          <tr><td>FILE</td><td>${proof.file_name || 'N/A'}</td></tr>
          <tr><td>SIZE</td><td>${proof.file_size || 'N/A'}</td></tr>
          <tr><td>SEALED</td><td>${displayDate}</td></tr>
          <tr><td>FROM</td><td>${senderEmail}</td></tr>
          <tr><td>TO</td><td>${recipientEmail || 'N/A'}</td></tr>
          ${proof.project_name ? `<tr><td>PROJECT</td><td>${proof.project_name}</td></tr>` : ''}
          <tr><td>RAC LEVEL</td><td class="rac-level-val">3 — FULL CHAIN</td></tr>
          ${chainHash ? `<tr><td>RAC HASH</td><td class="hash-val">${chainHash}</td></tr>` : ''}
          ${proof.file_hash ? `<tr><td>FILE HASH</td><td class="hash-val">${proof.file_hash}</td></tr>` : ''}
          ${isConfirmed && proof.recipient_confirmed_at ? `<tr><td>CONFIRMED</td><td>${new Date(proof.recipient_confirmed_at).toUTCString()}</td></tr>` : ''}
        </table>

        <div class="rac-chain">
          <div class="rac-chain-title">RAC CHAIN — 4 LAYERS</div>
          <div class="rac-layer">
            <span class="rac-layer-badge">✓ L1 WHO</span>
            <div>
              <div class="rac-layer-label">IDENTITY</div>
              <div class="rac-layer-text">${senderEmail}</div>
            </div>
          </div>
          <div class="rac-layer">
            <span class="rac-layer-badge">✓ L2 WHICH</span>
            <div>
              <div class="rac-layer-label">SCOPE</div>
              <div class="rac-layer-text">${proof.file_name || 'N/A'} → ${recipientEmail}</div>
            </div>
          </div>
          <div class="rac-layer">
            <span class="rac-layer-badge">✓ L3 WHAT</span>
            <div>
              <div class="rac-layer-label">CONFIRMATION</div>
              <div class="rac-layer-text">Stripe payment verified · Hash sealed</div>
            </div>
          </div>
          <div class="rac-layer">
            ${layer4Badge}
            <div>
              <div class="rac-layer-label">WHEN</div>
              ${layer4Text}
            </div>
          </div>
        </div>

        <div class="proof-points">
          <div class="proof-points-title">WHAT THIS RECEIPT PROVES</div>
          <div class="proof-point">
            <span class="proof-point-check">✓</span>
            <span><strong>${senderEmail}</strong> delivered this exact file (SHA-256 hash sealed)</span>
          </div>
          <div class="proof-point">
            <span class="proof-point-check">✓</span>
            <span>Delivery was addressed to <strong>${recipientEmail}</strong> (recipient identity locked)</span>
          </div>
          <div class="proof-point">
            <span class="proof-point-check">✓</span>
            <span>Payment of $0.99 was made and verified by Stripe at the exact timestamp</span>
          </div>
          <div class="proof-point">
            <span class="proof-point-check">${isConfirmed ? '✓' : '○'}</span>
            <span>Recipient confirmed receipt${isConfirmed ? ' — Layer 4 complete' : ' — pending confirmation'}</span>
          </div>
        </div>

        <hr class="divider">
        <div>
          <a class="btn btn-primary" href="${receiptUrl}">VIEW RECEIPT</a>
          <button class="btn btn-outline" onclick="copyLink('${verifyUrl}')">COPY VERIFY LINK</button>
          <span class="copy-feedback" id="copy-feedback">COPIED!</span>
        </div>
        ${confirmSection}
      `;

      document.getElementById('receipt-content').innerHTML = html;

      // Auto-copy verify link at 600ms (spec requirement)
      setTimeout(() => {
        if (navigator.clipboard && verifyUrl) {
          navigator.clipboard.writeText(verifyUrl).catch(() => {});
        }
      }, 600);
    }

    function copyLink(url) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => {
          const fb = document.getElementById('copy-feedback');
          if (fb) { fb.classList.add('show'); setTimeout(() => fb.classList.remove('show'), 2000); }
        });
      }
    }

    async function confirmReceipt(pid) {
      try {
        const resp = await fetch('/api/confirm-receipt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ proofId: pid })
        });
        const data = await resp.json();
        if (data.confirmed) {
          window.location.href = `/receipt?id=${pid}`;
        } else {
          alert(data.error || 'Confirmation failed. Please try again.');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
    }

    // ── Polling logic ──────────────────────────────────────────────────────
    async function fetchProofById(pid) {
      const resp = await fetch(`/.netlify/functions/get-proof?id=${encodeURIComponent(pid)}`);
      if (resp.status === 404) return null;
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      return data.proof || null;
    }

    async function fetchProofBySession(sid) {
      const resp = await fetch(`/.netlify/functions/get-proof-by-session?session_id=${encodeURIComponent(sid)}`);
      if (resp.status === 404) return null;
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      return data.proof || null;
    }

    async function poll() {
      pollCount++;
      if (pollCount > MAX_POLLS) {
        renderError('Proof is taking longer than expected. Please refresh in a few minutes or contact support.');
        return;
      }

      try {
        let proof = null;

        // If we have a proofId in the URL, use it directly
        if (proofId) {
          proof = await fetchProofById(proofId);
        }

        // If no proof yet and we have a session_id, try that
        if (!proof && sessionId) {
          proof = await fetchProofBySession(sessionId);
        }

        if (!proof) {
          // Still pending — keep polling
          renderPending();
          pollTimer = setTimeout(poll, 3000);
          return;
        }

        // Got proof — check if it's sealed yet
        if (!proof.is_valid && proof.status === 'pending') {
          // Still sealing — keep polling
          pollTimer = setTimeout(poll, 3000);
          return;
        }

        // Proof is ready — render it
        renderProof(proof);

      } catch (err) {
        console.error('[receipt] Poll error:', err.message);
        // Don't stop polling on transient errors
        pollTimer = setTimeout(poll, 3000);
      }
    }

    // ── Start ──────────────────────────────────────────────────────────────
    if (!proofId && !sessionId) {
      renderError('No proof ID found in URL. Please check the link and try again.');
    } else {
      // Start polling immediately
      poll();
    }
  </script>
</body>
</html>
