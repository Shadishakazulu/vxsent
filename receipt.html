<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — SENT. RAC v1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0a1628 0%, #1a2f4a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(15, 25, 40, 0.95);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.2);
      padding-bottom: 20px;
    }

    .header h1 {
      font-size: 28px;
      color: #00ff88;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 12px;
    }

    .status-badge.pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid #ffc107;
    }

    .status-badge.confirmed {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
      border: 1px solid #00ff88;
    }

    .status-badge.sealed {
      background: rgba(100, 150, 255, 0.2);
      color: #6496ff;
      border: 1px solid #6496ff;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 12px;
      color: #00ff88;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.2);
      padding-bottom: 8px;
    }

    .field {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .field-label {
      color: #888;
      min-width: 200px;
    }

    .field-value {
      color: #e0e0e0;
      word-break: break-all;
      text-align: right;
      flex: 1;
      margin-left: 20px;
    }

    .field-value.hash {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .confirmation-section {
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 6px;
      padding: 20px;
      margin-top: 20px;
    }

    .confirmation-section.sealed {
      background: rgba(100, 150, 255, 0.05);
      border: 1px solid rgba(100, 150, 255, 0.2);
    }

    .confirmation-title {
      font-size: 13px;
      color: #00ff88;
      font-weight: bold;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .confirmation-title.sealed {
      color: #6496ff;
    }

    .confirmation-text {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 150px;
      padding: 12px 20px;
      border: 1px solid rgba(0, 255, 136, 0.5);
      background: transparent;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    button:hover {
      background: rgba(0, 255, 136, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.5);
      color: #ff4444;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.5);
      color: #00ff88;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 255, 136, 0.3);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .chain-link {
      font-size: 11px;
      color: #666;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      margin-top: 8px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .header h1 {
        font-size: 20px;
      }

      .field {
        flex-direction: column;
      }

      .field-label {
        margin-bottom: 4px;
      }

      .field-value {
        text-align: left;
        margin-left: 0;
      }

      .button-group {
        flex-direction: column;
      }

      button {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>RECEIPT</h1>
      <p>SENT. RAC v1 — Proof of Delivery</p>
      <div id="statusBadge" class="status-badge pending">Loading...</div>
    </div>

    <div id="errorContainer"></div>
    <div id="successContainer"></div>

    <div id="proofContent" style="display: none;">
      <!-- Proof Details Section -->
      <div class="section">
        <div class="section-title">Proof Details</div>
        <div class="field">
          <span class="field-label">Proof ID:</span>
          <span class="field-value" id="proofId">—</span>
        </div>
        <div class="field">
          <span class="field-label">Status:</span>
          <span class="field-value" id="proofStatus">—</span>
        </div>
        <div class="field">
          <span class="field-label">Created:</span>
          <span class="field-value" id="createdAt">—</span>
        </div>
        <div class="field">
          <span class="field-label">Amount:</span>
          <span class="field-value" id="amount">—</span>
        </div>
      </div>

      <!-- Sender Information -->
      <div class="section">
        <div class="section-title">Sender</div>
        <div class="field">
          <span class="field-label">Email:</span>
          <span class="field-value" id="senderEmail">—</span>
        </div>
        <div class="field">
          <span class="field-label">Timestamp:</span>
          <span class="field-value" id="senderTimestamp">—</span>
        </div>
      </div>

      <!-- Recipient Information -->
      <div class="section">
        <div class="section-title">Recipient</div>
        <div class="field">
          <span class="field-label">Email:</span>
          <span class="field-value" id="recipientEmail">—</span>
        </div>
        <div class="field">
          <span class="field-label">Confirmation Status:</span>
          <span class="field-value" id="recipientStatus">Not yet confirmed</span>
        </div>
      </div>

      <!-- Cryptographic Chain -->
      <div class="section">
        <div class="section-title">Cryptographic Chain</div>
        <div class="field">
          <span class="field-label">Signature (Ed25519):</span>
          <span class="field-value hash" id="signature">—</span>
        </div>
        <div class="field">
          <span class="field-label">Chain Link (SHA-256):</span>
          <span class="field-value hash" id="chainLink">—</span>
        </div>
      </div>

      <!-- Confirmation UI -->
      <div id="confirmationUI"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const proofId = params.get('id');
    const confirmParam = params.get('confirm');

    async function loadProof() {
      if (!proofId) {
        showError('No proof ID provided. Use ?id=YOUR_PROOF_ID');
        return;
      }

      try {
        const response = await fetch(`/.netlify/functions/get-proof?id=${proofId}`);
        const result = await response.json();

        if (!response.ok) {
          showError(result.error || 'Failed to load proof');
          return;
        }

        const proof = result;
        displayProof(proof);

        // If ?confirm=true, show confirmation UI
        if (confirmParam === 'true') {
          showConfirmationUI(proof);
        }

      } catch (error) {
        showError(`Error loading proof: ${error.message}`);
      }
    }

    function displayProof(proof) {
      document.getElementById('proofContent').style.display = 'block';
      document.getElementById('proofId').textContent = proof.proof_id;
      document.getElementById('proofStatus').textContent = proof.status.toUpperCase();
      document.getElementById('createdAt').textContent = new Date(proof.sealed_at).toLocaleString();
      document.getElementById('amount').textContent = `$${(proof.amount_cents / 100).toFixed(2)}`;
      document.getElementById('senderEmail').textContent = proof.sender_email;
      document.getElementById('senderTimestamp').textContent = new Date(proof.sealed_at).toLocaleString();
      document.getElementById('recipientEmail').textContent = proof.recipient_email;
      document.getElementById('signature').textContent = proof.ed25519_signature || 'N/A';
      document.getElementById('chainLink').textContent = proof.chain_hash || 'N/A';

      // Update status badge
      const badge = document.getElementById('statusBadge');
      badge.className = `status-badge ${proof.status}`;
      badge.textContent = proof.status.toUpperCase();

      // Update recipient confirmation status
      if (proof.recipient_confirmed) {
        document.getElementById('recipientStatus').textContent = `Confirmed on ${new Date(proof.recipient_confirmed_at).toLocaleString()}`;
      }
    }

    function showConfirmationUI(proof) {
      if (proof.recipient_confirmed) {
        showSuccess('You have already confirmed receipt of this delivery.');
        return;
      }

      if (proof.status !== 'sealed') {
        showError('This proof is not ready for recipient confirmation. Status: ' + proof.status);
        return;
      }

      const ui = document.getElementById('confirmationUI');
      ui.innerHTML = `
        <div class="confirmation-section sealed">
          <div class="confirmation-title sealed">Awaiting Recipient Confirmation</div>
          <div class="confirmation-text">
            This delivery has been sealed by the sender. By confirming receipt below, you cryptographically prove that you received this file on this date and time. This confirmation will be recorded permanently in the proof chain.
          </div>
          <div class="button-group">
            <button onclick="confirmReceipt('${proof.proof_id}')">Confirm I Received This</button>
            <button onclick="window.location.href='/'">Cancel</button>
          </div>
        </div>
      `;
    }

    async function confirmReceipt(id) {
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Confirming...';

      try {
        const response = await fetch('/.netlify/functions/confirm-receipt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ proofId: id })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Confirmation failed');
        }

        showSuccess('Receipt confirmed! Your confirmation has been recorded in the proof chain.');
        setTimeout(() => loadProof(), 1000);

      } catch (error) {
        showError(`Confirmation failed: ${error.message}`);
        btn.disabled = false;
        btn.innerHTML = 'Confirm I Received This';
      }
    }

    function showError(message) {
      const container = document.getElementById('errorContainer');
      container.innerHTML = `<div class="error">${message}</div>`;
    }

    function showSuccess(message) {
      const container = document.getElementById('successContainer');
      container.innerHTML = `<div class="success">${message}</div>`;
    }

    // Load proof on page load
    loadProof();
  </script>
</body>
</html>
