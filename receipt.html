<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENT. — Cryptographic Proof Receipt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #111;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .receipt-container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        .receipt-header {
            padding: 40px 40px 32px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .brand {
            font-family: 'Bebas Neue', Impact, sans-serif;
            font-size: 32px;
            letter-spacing: 3px;
            color: #111;
        }
        .brand-dot { color: #00b356; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .status-sealed {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .status-pending {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fde68a;
        }
        .status-invalid {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .receipt-body { padding: 32px 40px; }
        .section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .field {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid #f9fafb;
        }
        .field:last-child { border-bottom: none; }
        .field-label {
            font-size: 11px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 140px;
            flex-shrink: 0;
        }
        .field-value {
            font-size: 13px;
            font-weight: 500;
            color: #111;
            text-align: right;
            word-break: break-all;
        }
        .field-value.mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 400;
        }
        .field-value.hash {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 420px;
        }
        .field-value.green { color: #16a34a; }
        .chain-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #2563eb;
            text-decoration: none;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }
        .chain-link:hover { text-decoration: underline; }
        .verification-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 2px;
            padding: 20px;
            margin-top: 32px;
        }
        .verification-box h4 {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 12px;
        }
        .verification-box code {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #374151;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .receipt-footer {
            padding: 24px 40px;
            border-top: 1px solid #f3f4f6;
            text-align: center;
        }
        .footer-text {
            font-size: 11px;
            color: #9ca3af;
            line-height: 1.6;
        }
        .loading {
            text-align: center;
            padding: 80px 40px;
            color: #6b7280;
        }
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e5e7eb;
            border-top-color: #00b356;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg ); } }
        .error-state {
            text-align: center;
            padding: 80px 40px;
            color: #dc2626;
        }
        @media (max-width: 640px) {
            body { padding: 16px 12px; }
            .receipt-header { padding: 24px 20px; flex-direction: column; gap: 12px; }
            .receipt-body { padding: 24px 20px; }
            .field { flex-direction: column; gap: 4px; }
            .field-value { text-align: left; }
            .receipt-footer { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="receipt-container" id="receipt">
        <div class="loading" id="loading-state">
            <div class="loading-spinner"></div>
            <p>Retrieving cryptographic proof...</p>
        </div>
    </div>

    <script>
        (async function() {
            const container = document.getElementById('receipt');
            const loadingState = document.getElementById('loading-state');

            // Get proof ID from URL
            const params = new URLSearchParams(window.location.search);
            const proofId = params.get('id');

            if (!proofId) {
                container.innerHTML = '<div class="error-state"><p>No proof ID provided.</p><p style="margin-top:8px;font-size:12px;color:#6b7280;">Usage: /receipt?id=SENT-YYYY-XXXXXXXX-XXXX-XXXX-XXXX</p></div>';
                return;
            }

            try {
                const response = await fetch(`/.netlify/functions/get-proof?id=${encodeURIComponent(proofId)}`);
                
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || `Proof not found (${response.status})`);
                }

                const proof = await response.json();
                renderReceipt(proof);
            } catch (error) {
                container.innerHTML = `<div class="error-state"><p>${error.message}</p><p style="margin-top:8px;font-size:12px;color:#6b7280;">Proof ID: ${proofId}</p></div>`;
            }
        })();

        function renderReceipt(proof) {
            const container = document.getElementById('receipt');
            
            // Determine status
            let statusClass = 'status-pending';
            let statusText = 'PENDING';
            if (proof.status === 'sealed' && proof.isValid) {
                statusClass = 'status-sealed';
                statusText = '✓ SEALED & VERIFIED';
            } else if (proof.status === 'refunded' || !proof.isValid) {
                statusClass = 'status-invalid';
                statusText = '✗ INVALIDATED';
            }

            // Format date
            const sealedDate = proof.sealedAt ? new Date(proof.sealedAt).toLocaleString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short'
            }) : 'Pending...';

            // Build chain link
            let chainLinkHtml = '<span style="color:#6b7280;font-size:11px;">Genesis (first proof in chain)</span>';
            if (proof.previousProofId) {
                chainLinkHtml = `<a class="chain-link" href="/receipt?id=${proof.previousProofId}">← ${proof.previousProofId}</a>`;
            }

            container.innerHTML = `
                <div class="receipt-header">
                    <div class="brand">● SENT<span class="brand-dot">.</span></div>
                    <div class="status-badge ${statusClass}">${statusText}</div>
                </div>

                <div class="receipt-body">
                    <!-- Identity -->
                    <div class="section">
                        <div class="section-title">Proof Identity</div>
                        <div class="field">
                            <span class="field-label">Proof ID</span>
                            <span class="field-value mono">${proof.proofId}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">RAC Version</span>
                            <span class="field-value mono">${proof.racVersion}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Sealed At</span>
                            <span class="field-value green">${sealedDate}</span>
                        </div>
                    </div>

                    <!-- File -->
                    <div class="section">
                        <div class="section-title">File Metadata</div>
                        <div class="field">
                            <span class="field-label">File Name</span>
                            <span class="field-value">${proof.fileName}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">File Size</span>
                            <span class="field-value">${proof.fileSize}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">SHA-256 Hash</span>
                            <span class="field-value hash">${proof.fileHash || 'N/A'}</span>
                        </div>
                    </div>

                    <!-- Cryptographic Proof -->
                    <div class="section">
                        <div class="section-title">Ed25519 Cryptographic Signature</div>
                        <div class="field">
                            <span class="field-label">Signature</span>
                            <span class="field-value hash">${proof.ed25519Signature || 'Pending...'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Public Key</span>
                            <span class="field-value hash">${proof.ed25519PublicKey || 'Pending...'}</span>
                        </div>
                    </div>

                    <!-- Chain -->
                    <div class="section">
                        <div class="section-title">Receipt Authentication Chain</div>
                        <div class="field">
                            <span class="field-label">Chain Hash</span>
                            <span class="field-value hash">${proof.chainHash || 'Pending...'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Previous Proof</span>
                            <span class="field-value">${chainLinkHtml}</span>
                        </div>
                    </div>

                    <!-- Parties -->
                    ${proof.senderEmail || proof.recipientEmail || proof.projectName ? `
                    <div class="section">
                        <div class="section-title">Parties</div>
                        ${proof.senderEmail ? `<div class="field"><span class="field-label">Sender</span><span class="field-value">${proof.senderEmail}</span></div>` : ''}
                        ${proof.recipientEmail ? `<div class="field"><span class="field-label">Recipient</span><span class="field-value">${proof.recipientEmail}</span></div>` : ''}
                        ${proof.projectName ? `<div class="field"><span class="field-label">Project</span><span class="field-value">${proof.projectName}</span></div>` : ''}
                    </div>
                    ` : ''}

                    <!-- Verification -->
                    <div class="verification-box">
                        <h4>Independent Verification</h4>
                        <code>Algorithm: Ed25519 (RFC 8032)
Canonical Payload: ${proof.canonicalPayload || 'N/A'}
Chain Method: SHA-256(previous_chain_hash + signature)

To verify: reconstruct the canonical payload above,
then verify the Ed25519 signature using the public key.
No account or API access required.</code>
                    </div>
                </div>

                <div class="receipt-footer">
                    <p class="footer-text">
                        This proof is cryptographically sealed and independently verifiable.  

                        It cannot be altered, revoked, or disputed.  
  

                        <a href="https://vxsent.com" style="color:#00b356;text-decoration:none;">vxsent.com</a> — Proof of Delivery Infrastructure
                    </p>
                </div>
            `;

            // Update page title
            document.title = `SENT. Proof — ${proof.proofId}`;
        }
    </script>
</body>
</html>
