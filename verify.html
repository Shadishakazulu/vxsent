<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENT. — Verify Delivery</title>
<script>
// This page exists for /verify/:id URLs from emails.
// It just redirects to /receipt?id=:id&confirm=true so the recipient lands directly on the acknowledge UI.
const path = window.location.pathname;
const match = path.match(/\/verify\/([^\/\?]+)/);
const proofId = match ? match[1] : null;
const params = new URLSearchParams(window.location.search);
const confirm = params.get('confirm');

if (proofId) {
  const confirmParam = confirm ? `&confirm=${confirm}` : '&confirm=true';
  window.location.replace(`/receipt?id=${proofId}${confirmParam}`);
} else {
  document.body.innerHTML = '<p style="text-align:center;padding:40px;font-family:monospace">Invalid verify link.</p>';
}
</script>
</head>
<body style="background:#0a1628;color:#00ff9d;font-family:monospace;text-align:center;padding:40px">
<p>Redirecting...</p>
</body>
</html>
