[build]
  publish = "."
  functions = "netlify/functions"


[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "*.html,netlify/functions/*.js,netlify/functions/package.json,_redirects,vxsent-production"

[functions]
  # The native Netlify Database package uses package export maps. The legacy
  # function tracer can omit its CommonJS entrypoint and cause HTTP 502 import
  # failures, while esbuild resolves and bundles the package correctly.
  node_bundler = "esbuild"


[dev]
  port = 8888


[[plugins]]
package = "@netlify/plugin-functions-install-core"


# ============================================================
# SCHEDULED FUNCTIONS
# ============================================================

# File deletion runs every 5 minutes:
# - deletes files 30 min after first download
# - deletes files 7 days after upload if never downloaded
# - deletes files when sender revokes
[functions."delete-expired-files"]
  schedule = "*/5 * * * *"


# ============================================================
# PAGE REDIRECTS
# ============================================================

[[redirects]]
from = "/"
to = "/index_updated.html"
status = 200
force = true


[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200
force = true


# Admin-only analytics dashboard (read-only). The page is not the security
# boundary — it probes /api/admin/check on load and the admin APIs gate on a
# server-side allowlist, so this route being known reveals nothing.
[[redirects]]
from = "/admin"
to = "/admin.html"
status = 200
force = true


[[redirects]]
