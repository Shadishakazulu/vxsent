[build]
  publish = "."
  functions = "netlify/functions"


[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "*.html,netlify/functions/*.js,netlify/functions/package.json,_redirects,vxsent-production"


[dev]
  port = 8888


[[plugins]]
package = "@netlify/plugin-functions-install-core"


# ============================================================
# SCHEDULED FUNCTIONS
# ============================================================

# File deletion runs every 5 minutes:
# - deletes files 30 min after first download
# - deletes files 7 days after upload if never downloaded
# - deletes files when sender revokes
[functions."delete-expired-files"]
  schedule = "*/5 * * * *"


# ============================================================
# PAGE REDIRECTS
# ============================================================

[[redirects]]
from = "/"
to = "/index.html"
status = 200
force = true


[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200
force = true


[[redirects]]
from = "/pricing"
to = "/pricing.html"
status = 200
force = true


[[redirects]]
from = "/login"
to = "/login.html"
status = 200
force = true


[[redirects]]
from = "/receipt"
to = "/receipt.html"
status = 200
force = true


# Verify endpoint — recipient email links land here.
# Format: /verify/SENT-2026-XXX?confirm=true
# verify.html reads the proof ID from window.location.pathname
[[redirects]]
from = "/verify/*"
to = "/verify.html"
status = 200


[[redirects]]
from = "/verify"
to = "/verify.html"
status = 200
force = true


