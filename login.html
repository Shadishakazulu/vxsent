<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENT. — Sign In</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='8' fill='%2300b356'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--ink:#111318;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --green:#00b356;--green-dk:#009347;--green-bg:rgba(0,179,86,0.07);--green-bd:rgba(0,179,86,0.2);
  --red:#dc2626;--border:#e1e4e8;--border-md:#c8cdd6;
  --shadow-md:0 4px 16px rgba(0,0,0,0.1),0 2px 4px rgba(0,0,0,0.06);
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.login-card{background:var(--surface);border:1.5px solid var(--border-md);border-radius:8px;padding:44px 40px;max-width:420px;width:100%;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--green-dk))}

.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.15em;display:flex;align-items:center;gap:8px;margin-bottom:28px;text-decoration:none;color:var(--ink)}
.logo-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,179,86,0.4)}60%{box-shadow:0 0 0 6px rgba(0,179,86,0)}}

h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.04em;margin-bottom:8px;color:var(--ink)}
.sub{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:28px}

label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
input[type=email],input[type=text]{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:4px;font-size:15px;color:var(--ink);outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.15s;margin-bottom:14px}
input[type=email]:focus,input[type=text]:focus{border-color:var(--green)}
input[type=text]#promo{text-transform:uppercase;letter-spacing:0.1em;font-family:'JetBrains Mono',monospace;font-size:14px}

/* Promo toggle */
.promo-toggle{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;color:var(--green-dk);background:none;border:none;cursor:pointer;padding:0;margin:0 0 14px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.promo-toggle:hover{text-decoration:underline}
.promo-wrap{display:none}
.promo-wrap.show{display:block}
.promo-applied{font-size:12px;color:var(--green-dk);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:14px;display:none}
.promo-applied.show{display:block}

.login-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.1em;cursor:pointer;transition:all 0.15s;margin-bottom:12px}
.login-btn:hover{background:var(--green-dk)}
.login-btn:disabled{background:var(--border);color:var(--ink-4);cursor:not-allowed}

.error-msg{font-size:12px;color:var(--red);font-family:'JetBrains Mono',monospace;min-height:18px;margin-bottom:10px;letter-spacing:0.08em}
.success-box{background:var(--green-bg);border:1.5px solid var(--green-bd);border-radius:6px;padding:16px 18px;display:none}
.success-box.show{display:block}
.success-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--green-dk);margin-bottom:6px;font-weight:500}
.success-text{font-size:14px;color:var(--ink-2);line-height:1.55}

.login-note{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-4);text-align:center;margin-top:16px}
.login-note a{color:var(--ink-4);text-decoration:none}
.login-note a:hover{color:var(--ink)}

.error-banner{background:#fef2f2;border:1.5px solid rgba(220,38,38,0.2);border-radius:4px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em}
</style>
</head>
<body>

<div class="login-card">
  <a href="/" class="logo"><div class="logo-dot"></div>SENT.</a>

  <div id="errorBanner" class="error-banner" style="display:none"></div>

  <h1>SIGN IN</h1>
  <p class="sub">Enter your email and we'll send you a magic link. No password needed.</p>

  <div id="loginForm">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>

    <button type="button" class="promo-toggle" id="promoToggle" onclick="togglePromo()">+ Have a promo code?</button>
    <div class="promo-wrap" id="promoWrap">
      <label for="promo">Promo code (optional)</label>
      <input type="text" id="promo" placeholder="LAUNCH7" autocomplete="off" autocapitalize="characters" spellcheck="false">
    </div>

    <div class="error-msg" id="errMsg"></div>
    <button class="login-btn" id="loginBtn" onclick="sendLink()">SEND MAGIC LINK →</button>
  </div>

  <div class="success-box" id="successBox">
    <div class="success-title" id="successTitle">Check your email</div>
    <div class="success-text" id="successText">We sent a magic link to <strong id="sentEmail"></strong>. Click it to sign in. The link expires in 15 minutes.</div>
  </div>

  <div class="login-note">
    Don't have an account? <a href="/pricing">Start with $0.99 →</a>
  </div>
</div>

<script>
// Show error from URL param
const urlParams=new URLSearchParams(window.location.search);
const urlError=urlParams.get('error');
const errorMessages={
  invalid_link:'This sign-in link is invalid. Please request a new one.',
  invalid_token:'This sign-in link is invalid. Please request a new one.',
  expired_token:'This sign-in link has expired. Please request a new one.',
  server_error:'Something went wrong. Please try again.'
};
if(urlError&&errorMessages[urlError]){
  const b=document.getElementById('errorBanner');
  b.textContent=errorMessages[urlError];
  b.style.display='block';
}

// If a promo code arrives via URL (?promo=CODE), auto-open and prefill the field
const urlPromo=urlParams.get('promo');
if(urlPromo){
  document.getElementById('promoWrap').classList.add('show');
  document.getElementById('promoToggle').style.display='none';
  document.getElementById('promo').value=urlPromo.toUpperCase();
}

function togglePromo(){
  document.getElementById('promoWrap').classList.add('show');
  document.getElementById('promoToggle').style.display='none';
  document.getElementById('promo').focus();
}

async function sendLink(){
  const email=document.getElementById('email').value.trim();
  const promoCode=document.getElementById('promo').value.trim();
  const errMsg=document.getElementById('errMsg');
  const btn=document.getElementById('loginBtn');

  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    errMsg.textContent='Please enter a valid email address.';
    return;
  }

  btn.textContent='SENDING...';
  btn.disabled=true;
  errMsg.textContent='';

  try{
    const res=await fetch('/api/auth/magic-link',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, promoCode})
    });
    const data=await res.json();

    if(!res.ok)throw new Error(data.error||'Failed to send link');

    // Show success — tailor the message if a trial was applied
    document.getElementById('loginForm').style.display='none';
    document.getElementById('sentEmail').textContent=email;
    if(data.promoApplied){
      document.getElementById('successTitle').textContent=`Your ${data.trialDays}-day trial is ready`;
      document.getElementById('successText').innerHTML=`We sent a magic link to <strong>${email}</strong>. Click it to sign in and start your <strong>${data.trialDays}-day Solo trial</strong>. The link expires in 15 minutes.`;
    }
    document.getElementById('successBox').classList.add('show');

    // Dev mode — auto-redirect if token returned
    if(data._dev_token){
      setTimeout(()=>{
        window.location.href=`/api/auth/verify?token=${data._dev_token}&email=${encodeURIComponent(email)}`;
      },1500);
    }

  }catch(err){
    errMsg.textContent=err.message||'Failed to send magic link. Please try again.';
    btn.textContent='SEND MAGIC LINK →';
    btn.disabled=false;
  }
}

// Allow Enter key from either field
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')sendLink();});
document.getElementById('promo').addEventListener('keydown',e=>{if(e.key==='Enter')sendLink();});
</script>
</body>
</html>
