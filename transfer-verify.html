<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENT. — Verify Transfer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='8' fill='%2300b356'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--panel:#f0f2f5;--panel-hi:#e4e7ec;
  --ink:#111318;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --green:#00b356;--green-dk:#009347;--green-lt:#e6f7ee;--green-bg:rgba(0,179,86,0.07);--green-bd:rgba(0,179,86,0.22);
  --amber:#b45309;--amber-bg:rgba(180,83,9,0.06);--amber-bd:rgba(180,83,9,0.22);
  --red:#dc2626;--border:#e1e4e8;--border-md:#c8cdd6;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.1),0 2px 4px rgba(0,0,0,0.06);
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.15em;display:flex;align-items:center;gap:7px;color:var(--ink);text-decoration:none}
.logo-dot{width:7px;height:7px;background:var(--green);border-radius:50%}
.hdr-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3)}
.wrap{max-width:620px;margin:0 auto;padding:24px 18px 80px}
.state{text-align:center;padding:60px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3)}

.verdict{border-radius:8px;padding:24px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.verdict.ok{background:var(--surface);border:1.5px solid var(--green-bd)}
.verdict.ok::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--green-dk))}
.verdict-check{width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
.verdict h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.03em;margin-bottom:6px}
.verdict-sub{font-size:13px;color:var(--ink-2);line-height:1.55}
.verdict-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green-dk);margin-top:10px;letter-spacing:0.06em;word-break:break-all}

.checks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.vchip{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--green-dk);background:var(--green-bg);border:1px solid var(--green-bd);padding:6px 10px;border-radius:50px}
.vchip.pending{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-bd)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.card-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.drow{display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.drow:last-child{border-bottom:none}
.dk{color:var(--ink-3);flex-shrink:0}
.dv{color:var(--ink);text-align:right;font-weight:500;word-break:break-word}
.dv.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.desc{font-size:13px;color:var(--ink-2);line-height:1.6;background:var(--panel);border-radius:5px;padding:11px 13px;margin-top:8px}
.disc-block{margin-top:10px}
.disc-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
.disc-text{font-size:13px;color:var(--ink-2);line-height:1.55;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:5px;padding:9px 12px}
.terms-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--green-dk);background:var(--green-bg);border:1px solid var(--green-bd);padding:5px 9px;border-radius:50px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gal-item{aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--panel);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;text-decoration:none;color:var(--ink-3)}
.gal-item img{width:100%;height:100%;object-fit:cover}
.gal-name{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--ink-3);padding:4px;text-align:center;word-break:break-word}
.hashbox{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-2);line-height:1.9;word-break:break-all}
.hashbox .hk{color:var(--ink-4);text-transform:uppercase;letter-spacing:0.1em;font-size:9px;display:block;margin-top:8px}
.hashbox .hk:first-child{margin-top:0}
.disclaimer{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:6px;padding:13px 15px;margin-bottom:14px}
.disclaimer-text{font-size:12px;color:var(--ink-2);line-height:1.55}
.hidden{display:none}
.foot{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);margin-top:20px}
</style>
</head>
<body>

<header>
  <a href="/" class="logo"><div class="logo-dot"></div>SENT.</a>
  <div class="hdr-tag">Public Verification</div>
</header>

<div class="wrap">
  <div class="state" id="loadingState">Verifying transfer…</div>
  <div id="content" class="hidden"></div>
</div>

<script>
// transfer-verify reads the ID from /verify/SENT-TX-... path or ?id=
const path = window.location.pathname;
const m = path.match(/\/verify\/([^\/\?]+)/);
const qid = new URLSearchParams(window.location.search).get('id');
const transferId = (m ? m[1] : qid) ? decodeURIComponent(m ? m[1] : qid) : null;

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function showError(msg){ document.getElementById('loadingState').textContent = msg; }

async function load() {
  if (!transferId) { showError('No transfer ID provided.'); return; }
  try {
    const res = await fetch(`/api/transfer/${encodeURIComponent(transferId)}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Transfer not found.'); return; }
    render(data.transfer, data.evidence || []);
  } catch (e) { showError('Failed to verify transfer.'); }
}

function render(t, evidence) {
  document.getElementById('loadingState').classList.add('hidden');
  const content = document.getElementById('content');
  content.classList.remove('hidden');

  const sealed = t.is_valid;
  const acked = t.buyer_confirmed;
  const condition = t.condition === 'Custom' ? (t.condition_custom || 'Custom') : t.condition;
  const price = t.sale_price != null ? '$' + Number(t.sale_price).toLocaleString(undefined,{minimumFractionDigits:2}) : '—';

  const disclosures = [
    ['Known defects', t.disclosed_defects],['Damage', t.disclosed_damage],
    ['Missing parts', t.disclosed_missing_parts],['Repairs', t.disclosed_repairs],
    ['Special conditions', t.disclosed_special_conditions]
  ].filter(d => d[1]);
  const terms = [
    ['Sold As-Is', t.sold_as_is],['No Warranty', t.no_warranty],['Buyer Inspected', t.buyer_inspected],
    ['Inspection Completed', t.inspection_completed],['Acknowledged Condition', t.buyer_acknowledged_condition]
  ].filter(x => x[1]).map(x => x[0]);
  const ids = [
    ['VIN', t.vin],['Serial', t.serial_number],['Mileage', t.mileage],
    ['Model', t.model_number],['SKU', t.sku],['Location', t.location]
  ].filter(d => d[1]);

  let gallery = '';
  if (evidence.length) {
    gallery = `<div class="card"><div class="card-title">// Sealed evidence (${evidence.length})</div><div class="gallery">` +
      evidence.map(e => {
        const isImg = e.fileMimeType && e.fileMimeType.startsWith('image/');
        if (isImg && e.viewUrl) return `<a class="gal-item" href="${e.viewUrl}" target="_blank" rel="noopener"><img src="${e.viewUrl}" alt="${esc(e.fileName)}"></a>`;
        const icon = e.fileMimeType && e.fileMimeType.startsWith('video/') ? '🎬' : (e.fileMimeType==='application/pdf'?'📕':'📄');
        return `<a class="gal-item" href="${e.viewUrl||'#'}" target="_blank" rel="noopener"><div>${icon}</div><div class="gal-name">${esc(e.fileName)}</div></a>`;
      }).join('') + `</div></div>`;
  }

  content.innerHTML = `
    <div class="verdict ok">
      <div class="verdict-check">✓</div>
      <h1>VERIFIED TRANSFER</h1>
      <div class="verdict-sub">This record is cryptographically sealed and has not been altered.</div>
      <div class="verdict-id">${esc(t.id)}</div>
      <div class="checks">
        <span class="vchip">✓ Verified</span>
        <span class="vchip">✓ Not altered</span>
        <span class="vchip">✓ Timestamp confirmed</span>
        <span class="vchip ${acked?'':'pending'}">${acked?'✓ Acknowledgment confirmed':'• Awaiting acknowledgment'}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">// Transfer</div>
      <div class="drow"><span class="dk">Item</span><span class="dv">${esc(t.item_title)}</span></div>
      <div class="drow"><span class="dk">Seller</span><span class="dv">${esc(t.seller_name)}</span></div>
      <div class="drow"><span class="dk">Buyer</span><span class="dv">${esc(t.buyer_name)}</span></div>
      <div class="drow"><span class="dk">Price</span><span class="dv">${price}</span></div>
      <div class="drow"><span class="dk">Date</span><span class="dv">${esc(t.transfer_date)||'—'}</span></div>
      <div class="drow"><span class="dk">Condition</span><span class="dv">${esc(condition)||'—'}</span></div>
      ${t.description ? `<div class="desc">${esc(t.description)}</div>` : ''}
    </div>

    ${ids.length ? `<div class="card"><div class="card-title">// Identifiers</div>${ids.map(d=>`<div class="drow"><span class="dk">${d[0]}</span><span class="dv">${esc(d[1])}</span></div>`).join('')}</div>` : ''}

    ${disclosures.length ? `<div class="card"><div class="card-title">// Disclosures</div>${disclosures.map(d=>`<div class="disc-block"><div class="disc-label">${d[0]}</div><div class="disc-text">${esc(d[1])}</div></div>`).join('')}</div>` : ''}

    ${terms.length ? `<div class="card"><div class="card-title">// Agreement terms</div><div class="terms-row">${terms.map(x=>`<span class="chip">✓ ${x}</span>`).join('')}</div></div>` : ''}

    ${gallery}

    <div class="card">
      <div class="card-title">// Cryptographic proof</div>
      <div class="hashbox">
        <span class="hk">Transfer ID</span>${esc(t.id)}
        <span class="hk">Sealed at</span>${t.sealed_at ? esc(new Date(t.sealed_at).toUTCString()) : '—'}
        <span class="hk">Agreement hash (SHA-256)</span>${esc(t.agreement_hash)||'—'}
        <span class="hk">RAC chain hash</span>${esc(t.rac_chain_hash)||'—'}
        <span class="hk">Veridex signature</span>${esc(t.veridex_signature)||'—'}
        ${acked ? `<span class="hk">Buyer acknowledged</span>${esc(new Date(t.buyer_confirmed_at).toUTCString())}<span class="hk">Acknowledgment hash</span>${esc(t.buyer_confirmation_hash)}` : ''}
      </div>
    </div>

    <div class="disclaimer">
      <div class="disclaimer-text">This is an independent cryptographic record of the agreement, condition, and acknowledgment between the parties — proof of what was agreed and when. It is not legal advice and does not replace any title transfer, registration, or document required by law.</div>
    </div>

    <div class="foot">SENT. — Verified Transfer Infrastructure · Powered by Veridex · vxsent.com</div>
  `;
}

load();
</script>
</body>
</html>
